<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M&DTEST.com - Premium Online Coaching Exam Platform</title>
    <meta name="description" content="State-of-the-art online examination evaluation platform for coaching academies. Timed mock tests, rigorous analytics, and automated scorecards.">
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom Stylesheet -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- React 18 and Babel CDNs for Standalone Browser Execution -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- SheetJS for Excel bulk upload -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <script>
        window.addEventListener('error', function(e) {
            var div = document.createElement('div');
            div.style.position = 'fixed';
            div.style.top = '0';
            div.style.left = '0';
            div.style.width = '100%';
            div.style.background = '#fee2e2';
            div.style.color = '#991b1b';
            div.style.padding = '20px';
            div.style.borderBottom = '3px solid #f87171';
            div.style.zIndex = '999999';
            div.style.fontFamily = 'monospace';
            div.style.whiteSpace = 'pre-wrap';
            div.innerHTML = '<h3>🚨 Browser JS Error Detected:</h3>' + e.message + '\nat ' + e.filename + ':' + e.lineno + ':' + e.colno + '\n\nStack:\n' + (e.error ? e.error.stack : 'No stack trace');
            document.body.appendChild(div);
        });
        window.addEventListener('unhandledrejection', function(e) {
            var div = document.createElement('div');
            div.style.position = 'fixed';
            div.style.top = '0';
            div.style.left = '0';
            div.style.width = '100%';
            div.style.background = '#fee2e2';
            div.style.color = '#991b1b';
            div.style.padding = '20px';
            div.style.borderBottom = '3px solid #f87171';
            div.style.zIndex = '999999';
            div.style.fontFamily = 'monospace';
            div.style.whiteSpace = 'pre-wrap';
            div.innerHTML = '<h3>🚨 Unhandled Promise Rejection:</h3>' + e.reason + (e.reason && e.reason.stack ? '\n\nStack:\n' + e.reason.stack : '');
            document.body.appendChild(div);
        });
    </script>
    <div id="root"></div>

    <!-- Application Data and Components (Loaded via Babel JSX) -->
    <script src="data.js"></script>
    <script type="text/babel" src="components/Navbar.js"></script>
    <script type="text/babel" src="components/Login.js"></script>
    <script type="text/babel" src="components/Dashboard.js"></script>
    <script type="text/babel" src="components/ExamTaking.js"></script>
    <script type="text/babel" src="components/Admin.js"></script>
    <script type="text/babel" src="components/TeacherDashboard.js"></script>
    <script type="text/babel" src="app.js"></script>
    
    <!-- Initialize App -->
    <script type="text/babel">
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
